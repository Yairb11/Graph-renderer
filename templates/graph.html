<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Renderer</title>
    <link href="{{url_for('static',filename='styles/style.css')}}" rel = "stylesheet"/>
    <script src="{{url_for('static', filename='js/p5.min.js')}}"></script>
    <script src="{{url_for('static', filename='js/sketch.js')}}"></script>
    <script>
        function send_graph(){
            var user_input = document.getElementById("user_input").value;
            var l_border = parseFloat(document.getElementById("L_border").value);
            var r_border = parseFloat(document.getElementById("R_border").value);
            var b_border = parseFloat(document.getElementById("B_border").value);
            var t_border = parseFloat(document.getElementById("T_border").value);

            if((r_border - l_border <= 0) || (t_border - b_border <= 0))
                alert("Try Again");

            var output = create_graph(user_input, l_border, r_border, b_border, t_border);
            if(output != "All Good")
                alert(output);
            console.log(output);
            document.getElementById("output").innerHTML = user_input;
            

        }
    </script>
</head>
<body>
    <div id="output"></div>
    <input type="text" id ="user_input" placeholder="Write the function...">
    <button id="graph" onclick="send_graph()">Graph</button>
     L: <input type="number" id="L_border" step="0.01" value="-10" required>
     R: <input type="number" id="R_border" step="0.01" value="10" required>
     B: <input type="number" id="B_border" step="0.01" value="-10" required>
     T: <input type="number" id="T_border" step="0.01" value="10" required>
</body>
</html>
